<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DhikzxCloud - Profil Dimas Mahardika | Developer Bot WhatsApp</title>
    
    <meta name="description" content="Halaman profil Dimas Mahardika, developer bot WhatsApp (Miwa Botz).">
    <meta property="og:title" content="DhikzxCloud - Profil Dimas Mahardika">
    <meta property="og:image" content="https://store-panel.netlify.app/dikz.jpg"> 

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <link rel="stylesheet" href="styles.css">

    <style>
        /* UI UPGRADE: Soft Dark & Glassmorphism */
        :root {
            --primary-glow: rgba(0, 123, 255, 0.5);
            --bg-dark: #0f1014;
            --card-dark: #16181d;
        }

        /* Styling khusus SweetAlert2 agar terlihat Mahal */
        .custom-swal-popup {
            background: rgba(22, 24, 29, 0.8) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 24px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
        }

        .custom-swal-title {
            color: #ffffff !important;
            font-family: 'Poppins', sans-serif !important;
            font-weight: 600 !important;
            letter-spacing: 1px;
        }

        .custom-swal-text {
            color: #b0b0b0 !important;
            font-family: 'Poppins', sans-serif !important;
            font-weight: 300 !important;
        }

        .custom-swal-button {
            padding: 12px 35px !important;
            border-radius: 12px !important;
            font-weight: 500 !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            transition: all 0.3s ease !important;
            background: linear-gradient(135deg, #3085d6, #1e5fa1) !important;
            box-shadow: 0 4px 15px rgba(48, 133, 214, 0.3) !important;
        }

        .custom-swal-button:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 20px rgba(48, 133, 214, 0.5) !important;
        }

        .swal2-icon.swal2-warning {
            border-color: #f8bb86 !important;
            color: #f8bb86 !important;
            zoom: 0.8;
        }
    </style>
</head>

<body> 
    <div class="background-effects">
        <canvas id="particles-js"></canvas>
        <div class="binary-rain" id="binaryRain"></div>
    </div>

    <main class="container">
        <section class="profile-card" data-aos="fade-up">
            <div class="profile-img-container">
                <img src="dikz.jpg" alt="Dimas Mahardika" class="profile-img">
            </div>
            <h1 class="name">DHIKZX CLOUD</h1>
            <p class="tagline">"Tidak semua bisa dimiliki, tetapi semuanya bisa disyukuri"</p>
            
            <div class="social-links">
                <a href="https://wa.me/6285810287828" class="social-link" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
        </section>

        <section class="project-section skills-section" data-aos="fade-up">
            <h2 class="section-title">Proyek Unggulan</h2>
            <div class="skills-grid">
                <div class="project-card" data-aos="zoom-in">
                    <h3>Miwa Botz</h3>
                    <p class="project-desc">Bot WhatsApp Assistance berbasis Node.js.</p>
                    <a href="https://wa.me/15814048209?text=.menu" target="_blank" class="project-link cta-button">
                        <i class="fas fa-robot"></i> Kunjungi Bot
                    </a>
                </div>

                <div class="project-card" data-aos="zoom-in">
                    <h3>Automatic Store</h3>
                    <p class="project-desc">Sistem toko otomatis Panel Pterodactyl.</p>
                    <a href="javascript:void(0)" id="btn-store" class="project-link cta-button">
                        <i class="fas fa-store"></i> Kunjungi Store
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        // LOGIKA POP-UP MODERN & PROFESIONAL
        document.getElementById('btn-store').addEventListener('click', function() {
            Swal.fire({
                title: 'SYSTEM OFFLINE',
                html: '<p style="margin-bottom:10px">Mohon maaf, <b>DhikzxCloud Store</b> sedang dalam pemeliharaan berkala.</p><small style="opacity:0.6">Estimasi selesai: Segera</small>',
                icon: 'warning',
                customClass: {
                    popup: 'custom-swal-popup',
                    title: 'custom-swal-title',
                    htmlContainer: 'custom-swal-text',
                    confirmButton: 'custom-swal-button'
                },
                buttonsStyling: false,
                showClass: {
                    popup: 'animate__animated animate__zoomIn animate__faster'
                },
                hideClass: {
                    popup: 'animate__animated animate__fadeOut animate__faster'
                },
                confirmButtonText: 'OKE, SAYA MENGERTI',
            });
        });
    </script>
</body>
</html>
